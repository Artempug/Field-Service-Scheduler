<div style="padding: 8px 0;">
  <div class="dialog-header">
    <div class="dialog-icon" [class.danger]="data.danger" [class.info]="!data.danger">
      <mat-icon>{{ data.danger ? 'delete_forever' : 'info' }}</mat-icon>
    </div>
    <h2 class="dialog-title" mat-dialog-title>{{ data.title }}</h2>
  </div>

  <mat-dialog-content>
    <p class="dialog-message">{{ data.message }}</p>
  </mat-dialog-content>

  <div class="dialog-actions">
    <button mat-stroked-button (click)="dialogRef.close(false)">
      {{ data.cancelLabel ?? 'Cancel' }}
    </button>
    <button
      mat-flat-button
      [color]="data.danger ? 'warn' : 'primary'"
      (click)="dialogRef.close(true)"
    >
      {{ data.confirmLabel ?? 'Confirm' }}
    </button>
  </div>
</div>
