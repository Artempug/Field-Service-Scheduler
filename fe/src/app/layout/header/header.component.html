<header class="header">
  
  <div class="header-left">
    <nav class="breadcrumbs" aria-label="breadcrumb">
      @for (crumb of (breadcrumbs$ | async) ?? []; track crumb.label; let last = $last) {
        @if (!last) {
          <a [routerLink]="crumb.path" class="crumb-link">{{ crumb.label }}</a>
          <span class="crumb-sep">›</span>
        } @else {
          <span class="crumb-current">{{ crumb.label }}</span>
        }
      }
    </nav>
    <h1 class="page-title-text">{{ pageTitle$ | async }}</h1>
  </div>

  
  <div class="header-right">
    
    <button
      mat-icon-button
      (click)="theme.toggle()"
      [matTooltip]="(theme.isDark$ | async) ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      class="theme-btn"
    >
      <mat-icon>{{ (theme.isDark$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    
    <button mat-icon-button matTooltip="Notifications" class="notif-btn">
      <mat-icon>notifications_none</mat-icon>
    </button>
  </div>
</header>
